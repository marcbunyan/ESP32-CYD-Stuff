esphome:
  name: esphome-web-4620dc
  friendly_name: Solar Dashboard
  libraries:
    - SPI

esp32:
  board: esp32dev
  framework:
    type: arduino

globals:
  - id: display_on
    type: bool
    restore_value: true
    initial_value: 'true'

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: DEBUG

api:
ota:
  - platform: esphome

font:
  - file: "gfonts://Roboto"
    id: roboto_xl
    size: 42
    bpp: 4
  - file: "gfonts://Arimo"
    id: arimo20
    size: 22
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_med
    size: 26
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_arrow
    size: 32
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_small
    size: 14
    bpp: 4

# Backlight control
output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON

# Home Assistant sensors for energy distribution
sensor:
  - platform: homeassistant
    name: "Solar Power"
    id: solar_production
    entity_id: sensor.solarnet_power_photovoltaics
    accuracy_decimals: 2
  
  - platform: homeassistant
    name: "Grid Use"
    id: grid_power
    entity_id: sensor.solarnet_power_grid
    accuracy_decimals: 2
        
  - platform: homeassistant
    name: "House Load"
    id: house_load
    entity_id: sensor.solarnet_power_load
    accuracy_decimals: 2

  - platform: homeassistant
    name: "Self Consumption"
    id: self_consumption
    entity_id: sensor.solarnet_relative_self_consumption
    accuracy_decimals: 0

  - platform: homeassistant
    name: "Battery Power"
    id: battery_power
    entity_id: sensor.battery_power
    accuracy_decimals: 2

  - platform: homeassistant
    name: "Battery SoC"
    id: battery_soc
    entity_id: sensor.battery_state_of_charge
    accuracy_decimals: 0

# SPI Bus for Display and Touchscreen
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch_spi
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

# Touchscreen Configuration for CYD
touchscreen:
  - platform: xpt2046
    id: cyd_touchscreen
    display: esp_display
    spi_id: touch_spi
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    threshold: 400
    update_interval: 50ms
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 340
      y_max: 3860
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true

# Display configuration 
display:
  - platform: ili9xxx
    id: esp_display
    model: ILI9341
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    invert_colors: false
    color_order: rgb       # Correct channel swapping (red and blue channels)
    color_palette: 8BIT
    auto_clear_enabled: false
    rotation: 0
    dimensions: 
      width: 320
      height: 240
    update_interval: never

# Interval timer to refresh all dynamic UI labels and arrow animations (400ms tick)
interval:
  - interval: 400ms
    then:
      - lvgl.widget.refresh: [
          solar_val, solar_flow_lbl,
          battery_val, battery_watts,
          grid_val, grid_flow_lbl,
          home_val, home_flow_lbl,
          flow_solar, flow_battery, flow_grid, flow_solar_battery
        ]

# LVGL Engine Configuration
lvgl:
  displays:
    - esp_display
  touchscreens:
    - touchscreen_id: cyd_touchscreen
  theme:
    dark_mode: true
  
  on_idle:
    - timeout: 60s
      then:
        - light.turn_off: backlight
        - lvgl.pause:
  on_resume:
    then:
      - light.turn_on: backlight

  pages:
    - id: main_page
      widgets:
        # -------------------------------------------------------------
        # 1. Background Empty Cards (Centered with 30px central gaps)
        # -------------------------------------------------------------
        # Solar Card (Top-Left)
        - obj:
            id: card_solar
            x: 10
            y: 10
            width: 135
            height: 95
            bg_color: 0x1A1510
            border_color: 0xE67E22
            border_width: 2
            radius: 8
            pad_all: 0
            scrollbar_mode: "OFF"
            scrollable: false

        # Battery Card (Top-Right)
        - obj:
            id: card_battery
            x: 175
            y: 10
            width: 135
            height: 95
            bg_color: 0x101A10
            border_color: 0x2ECC71
            border_width: 2
            radius: 8
            pad_all: 0
            scrollbar_mode: "OFF"
            scrollable: false

        # Grid Card (Bottom-Left)
        - obj:
            id: card_grid
            x: 10
            y: 135
            width: 135
            height: 95
            bg_color: 0x10151A
            border_color: 0x3498DB
            border_width: 2
            radius: 8
            pad_all: 0
            scrollbar_mode: "OFF"
            scrollable: false

        # Home Card (Bottom-Right)
        - obj:
            id: card_home
            x: 175
            y: 135
            width: 135
            height: 95
            bg_color: 0x1A1010
            border_color: 0xE74C3C
            border_width: 2
            radius: 8
            pad_all: 0
            scrollbar_mode: "OFF"
            scrollable: false

        # -------------------------------------------------------------
        # 2. LED-style Dot Icons (Drawn on top of cards)
        # -------------------------------------------------------------
        - obj:
            x: 20
            y: 22
            width: 8
            height: 8
            bg_color: 0xE67E22
            radius: 4
            border_width: 0

        - obj:
            x: 185
            y: 22
            width: 8
            height: 8
            bg_color: 0x2ECC71
            radius: 4
            border_width: 0

        - obj:
            x: 20
            y: 147
            width: 8
            height: 8
            bg_color: 0x3498DB
            radius: 4
            border_width: 0

        - obj:
            x: 185
            y: 147
            width: 8
            height: 8
            bg_color: 0xE74C3C
            radius: 4
            border_width: 0

        # -------------------------------------------------------------
        # 3. Card Title Labels (Shifted right to make room for LED dot icons)
        # -------------------------------------------------------------
        - label:
            x: 32
            y: 18
            width: 100
            height: 18
            text_color: 0x888888
            text_font: roboto_small
            text: "Solar"

        - label:
            x: 197
            y: 18
            width: 100
            height: 18
            text_color: 0x888888
            text_font: roboto_small
            text: "Battery"

        - label:
            x: 32
            y: 143
            width: 100
            height: 18
            text_color: 0x888888
            text_font: roboto_small
            text: "Grid"

        - label:
            x: 197
            y: 143
            width: 100
            height: 18
            text_color: 0x888888
            text_font: roboto_small
            text: "Home"

        # -------------------------------------------------------------
        # 4. Card Value Labels (Vertically and Horizontally Centered)
        # -------------------------------------------------------------
        # Solar Value
        - label:
            id: solar_val
            x: 10
            y: 42
            width: 135
            height: 30
            text_align: CENTER
            text_font: roboto_med
            text_color: 0xFFFFFF
            text: !lambda |-
              if (id(solar_production).has_state() && !std::isnan(id(solar_production).state)) {
                float kW = id(solar_production).state;
                char buf[16];
                snprintf(buf, sizeof(buf), "%.2f kW", kW);
                return std::string(buf);
              }
              return std::string("N/A");

        # Battery Value (SoC %)
        - label:
            id: battery_val
            x: 175
            y: 42
            width: 135
            height: 30
            text_align: CENTER
            text_font: roboto_med
            text_color: 0xFFFFFF
            text: !lambda |-
              if (id(battery_soc).has_state() && !std::isnan(id(battery_soc).state)) {
                char buf[16];
                snprintf(buf, sizeof(buf), "%.0f%%", id(battery_soc).state);
                return std::string(buf);
              }
              return std::string("N/A");

        # Grid Value (Absolute Net kW)
        - label:
            id: grid_val
            x: 10
            y: 167
            width: 135
            height: 30
            text_align: CENTER
            text_font: roboto_med
            text_color: 0xFFFFFF
            text: !lambda |-
              if (id(grid_power).has_state() && !std::isnan(id(grid_power).state)) {
                float kW = id(grid_power).state;
                char buf[16];
                snprintf(buf, sizeof(buf), "%.2f kW", std::abs(kW));
                return std::string(buf);
              }
              return std::string("N/A");

        # Home Value (Absolute kW Load)
        - label:
            id: home_val
            x: 175
            y: 167
            width: 135
            height: 30
            text_align: CENTER
            text_font: roboto_med
            text_color: 0xFFFFFF
            text: !lambda |-
              if (id(house_load).has_state() && !std::isnan(id(house_load).state)) {
                float kW = id(house_load).state;
                char buf[16];
                snprintf(buf, sizeof(buf), "%.2f kW", std::abs(kW));
                return std::string(buf);
              }
              return std::string("N/A");

        # -------------------------------------------------------------
        # 5. Bottom Card Text Labels (Centered static info)
        # -------------------------------------------------------------
        # Solar Bottom Label (Self Consumption)
        - label:
            id: solar_flow_lbl
            x: 10
            y: 75
            width: 135
            height: 18
            text_align: CENTER
            text_font: roboto_small
            text_color: 0x888888
            text: !lambda |-
              if (id(self_consumption).has_state() && !std::isnan(id(self_consumption).state)) {
                char buf[32];
                snprintf(buf, sizeof(buf), "Self Cons: %.0f%%", id(self_consumption).state);
                return std::string(buf);
              }
              return std::string("Self Cons: N/A");

        # Battery Bottom Label (Charge/Discharge Power)
        - label:
            id: battery_watts
            x: 175
            y: 75
            width: 135
            height: 18
            text_align: CENTER
            text_font: roboto_small
            text_color: 0x888888
            text: !lambda |-
              if (id(battery_power).has_state() && !std::isnan(id(battery_power).state)) {
                float kW = id(battery_power).state;
                char val_buf[16];
                snprintf(val_buf, sizeof(val_buf), "%s%.2f kW", (kW >= 0 ? "+" : ""), kW);
                return std::string(val_buf);
              }
              return std::string("0.00 kW");

        # Grid Bottom Label (Import/Export status)
        - label:
            id: grid_flow_lbl
            x: 10
            y: 200
            width: 135
            height: 18
            text_align: CENTER
            text_font: roboto_small
            text_color: 0x888888
            text: !lambda |-
              if (id(grid_power).has_state() && !std::isnan(id(grid_power).state)) {
                float kW = id(grid_power).state;
                if (kW > 0.05f) return std::string("Importing");
                if (kW < -0.05f) return std::string("Exporting");
                return std::string("Idle");
              }
              return std::string("N/A");

        # Home Bottom Label (Load status)
        - label:
            id: home_flow_lbl
            x: 175
            y: 200
            width: 135
            height: 18
            text_align: CENTER
            text_font: roboto_small
            text_color: 0x888888
            text: !lambda |-
              if (id(house_load).has_state() && !std::isnan(id(house_load).state)) {
                float kW = id(house_load).state;
                return std::abs(kW) > 0.05f ? std::string("Active Load") : std::string("Idle");
              }
              return std::string("N/A");

        # -------------------------------------------------------------
        # 6. Inter-Card Flow Chevron Labels (Positioned in 30px gaps)
        # -------------------------------------------------------------
        # Large vertical flow arrow below Solar (Top-Left -> Bottom-Left)
        - label:
            id: flow_solar
            x: 65
            y: 104
            width: 25
            height: 30
            text_align: CENTER
            text_font: roboto_arrow
            text_color: 0xE67E22
            text: !lambda |-
              float kW = id(solar_production).has_state() && !std::isnan(id(solar_production).state) ? id(solar_production).state : 0.0f;
              if (kW > 0.05f) {
                return ((millis() / 400) % 2 == 0) ? std::string("v") : std::string(" ");
              }
              return std::string(" ");

        # Large vertical flow arrow below Battery (Top-Right <-> Bottom-Right)
        - label:
            id: flow_battery
            x: 230
            y: 104
            width: 25
            height: 30
            text_align: CENTER
            text_font: roboto_arrow
            text_color: 0x2ECC71
            text: !lambda |-
              float kW = id(battery_power).has_state() && !std::isnan(id(battery_power).state) ? id(battery_power).state : 0.0f;
              if (kW > 0.05f) { // Charging: flow goes up into battery
                return ((millis() / 400) % 2 == 0) ? std::string("^") : std::string(" ");
              } else if (kW < -0.05f) { // Discharging: flow goes down into home
                return ((millis() / 400) % 2 == 0) ? std::string("v") : std::string(" ");
              }
              return std::string(" ");

        # Large horizontal flow arrow between Grid and Home (Bottom-Left <-> Bottom-Right)
        - label:
            id: flow_grid
            x: 147
            y: 160
            width: 26
            height: 30
            text_align: CENTER
            text_font: roboto_arrow
            text_color: 0x3498DB
            text: !lambda |-
              float kW = id(grid_power).has_state() && !std::isnan(id(grid_power).state) ? id(grid_power).state : 0.0f;
              if (kW > 0.05f) { // Importing: flow goes right from grid to home
                return ((millis() / 400) % 2 == 0) ? std::string(">") : std::string(" ");
              } else if (kW < -0.05f) { // Exporting: flow goes left from home to grid
                return ((millis() / 400) % 2 == 0) ? std::string("<") : std::string(" ");
              }
              return std::string(" ");

        # Large horizontal flow arrow between Solar and Battery (Top-Left -> Top-Right)
        - label:
            id: flow_solar_battery
            x: 147
            y: 35
            width: 26
            height: 30
            text_align: CENTER
            text_font: roboto_arrow
            text_color: 0xE67E22
            text: !lambda |-
              float solar_kW = id(solar_production).has_state() && !std::isnan(id(solar_production).state) ? id(solar_production).state : 0.0f;
              float bat_kW = id(battery_power).has_state() && !std::isnan(id(battery_power).state) ? id(battery_power).state : 0.0f;
              if (solar_kW > 0.05f && bat_kW > 0.05f) { // Solar active and battery charging
                return ((millis() / 400) % 2 == 0) ? std::string(">") : std::string(" ");
              }
              return std::string(" ");
